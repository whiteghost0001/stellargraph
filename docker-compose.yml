version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stellargraph-db
    environment:
      POSTGRES_DB: stellargraph
      POSTGRES_USER: stellargraph_user
      POSTGRES_PASSWORD: stellargraph_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stellargraph-network

  redis:
    image: redis:7-alpine
    container_name: stellargraph-redis
    ports:
      - "6379:6379"
    networks:
      - stellargraph-network

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stellargraph-indexer
    environment:
      DATABASE_URL: postgresql://stellargraph_user:stellargraph_password@postgres:5432/stellargraph
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    ports:
      - "3000:3000"
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - stellargraph-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  stellargraph-network:
    driver: bridge